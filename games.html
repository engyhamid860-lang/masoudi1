<!DOCTYPE html><html lang="ar">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>الألعاب</title><style>

body{
margin:0;
font-family:'Segoe UI', Arial;
background:#111;
color:white;
padding-bottom:120px;
}

/* الهيدر الذهبي */

.header{
height:220px;
background:linear-gradient(135deg,#ffcc00,#f7b500);
border-bottom-left-radius:80px 40px;
border-bottom-right-radius:80px 40px;
padding:30px;
text-align:center;
}

.header h1{
font-size:28px;
font-weight:900;
}

/* الكارت */

.games-card{
margin-top:-70px;
width:92%;
max-width:380px;
margin-left:auto;
margin-right:auto;
background:#1c1c1e;
border-radius:30px;
padding:25px;
border:1px solid #2a2a2a;
}

/* شبكة الألعاب */

.games-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

/* كارت اللعبة */

.game-box{
background:#2c2c2e;
padding:20px;
border-radius:25px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.game-box:hover{
transform:translateY(-5px);
}

.game-box img{
width:90px;
height:90px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.game-box p{
margin-top:10px;
font-weight:bold;
font-size:16px;
color:white;
}

/* الشريط السفلي */

.navbar{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:420px;
background:#1c1c1e;
padding:14px 0;
border-radius:35px;
border:1px solid #2a2a2a;
display:flex;
justify-content:space-around;
}

.nav-btn{
background:none;
border:none;
color:#aaa;
font-weight:bold;
font-size:14px;
display:flex;
flex-direction:column;
align-items:center;
}

.nav-btn.active{
color:#f7b500;
}

</style></head><body><div class="header">
<h1>🎮 الألعاب</h1>
</div><div class="games-card"><div class="games-grid"><div class="game-box"
onclick="openGame()"><img src="wheel.png"><p>عجلة الحظ</p></div></div></div><div class="navbar"><button class="nav-btn"
onclick="location.href='index.html'">
🏠
<span>الرئيسية</span>
</button>

<button class="nav-btn"
onclick="location.href='wallet.html'">
💰
<span>المحفظة</span>
</button>

<button class="nav-btn active">
🎮
<span>الألعاب</span>
</button><button class="nav-btn"
onclick="logout()">
🚪
<span>خروج</span>
</button>

</div><script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDhxOBatW40tfzP2nZVhSjJI55NeY4Nf_o",

authDomain: "popo-da43c.firebaseapp.com",

projectId: "popo-da43c",

storageBucket: "popo-da43c.firebasestorage.app",

messagingSenderId: "570136899084",

appId: "1:570136899084:web:2a86be16b0ff2261c98829"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let walletBalance = 0;

onAuthStateChanged(auth, async(user)=>{

if(!user){
location.href="login.html";
return;
}

const snap = await getDoc(doc(db,"users",user.uid));

if(snap.exists()){

walletBalance = snap.data().walletBalance || 0;

}

});

window.logout = function(){

signOut(auth).then(()=>{

location.href="login.html";

});

}

window.openGame = function(){

localStorage.setItem("playerBalance", walletBalance);

location.href="https://game2-ten-mu.vercel.app/";

}

</script></body>
</html>
