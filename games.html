<!DOCTYPE html><html lang="ar">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الألعاب</title><style>

body{
margin:0;
font-family:'Segoe UI', Arial;
background:#111;
color:white;
padding-bottom:120px;
}

/* الهيدر */

.header{
height:220px;
background:linear-gradient(135deg,#ffcc00,#f7b500);
border-bottom-left-radius:80px 40px;
border-bottom-right-radius:80px 40px;
padding:30px;
text-align:center;
}

.title{
font-size:28px;
font-weight:900;
}

/* الكارت */

.games-container{
width:92%;
max-width:420px;
margin:auto;
margin-top:-60px;
background:#1c1c1e;
padding:25px;
border-radius:30px;
border:1px solid #2a2a2a;
}

/* شبكة الألعاب */

.games-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-top:10px;
}

/* كارت اللعبة */

.game-card{
background:#2c2c2e;
border-radius:20px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.game-card:hover{
transform:translateY(-5px);
}

.game-card img{
width:80px;
height:80px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.5);
}

.game-card p{
margin-top:10px;
font-weight:bold;
}

/* الشريط السفلي */

.navbar{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:420px;
background:#1c1c1e;
padding:14px 0;
border-radius:35px;
border:1px solid #2a2a2a;
display:flex;
justify-content:space-around;
}

.nav-btn{
background:none;
border:none;
color:#aaa;
font-weight:bold;
display:flex;
flex-direction:column;
align-items:center;
}

.nav-btn.active{
color:#f7b500;
}

</style></head><body><div class="header">
<h1 class="title">🎮 الألعاب</h1>
</div><div class="games-container"><div class="games-grid"><a href="https://game2-ten-mu.vercel.app/" target="_blank">
<div class="game-card"><img src="wheel.png"><p>عجلة الحظ</p></div>
</a></div></div><div class="navbar"><button class="nav-btn" onclick="window.location.href='index.html'">
🏠 <span>الرئيسية</span>
</button><button class="nav-btn" onclick="window.location.href='wallet.html'">
💰 <span>المحفظة</span>
</button><button class="nav-btn active">
🎮 <span>الألعاب</span>
</button><button class="nav-btn" onclick="window.location.href='login.html'">
🚪 <span>خروج</span>
</button></div></body>
</html>
