  const snap = await getDoc(userRef);

  if(!snap.exists()) return;

  const data = snap.data();

  const now = new Date();
  const lastClaim = data.lastDailyClaim
    ? data.lastDailyClaim.toDate()
    : null;

  if(!lastClaim){
    activateReward();
    setProgress(100);
    return;
  }

  const diff = now - lastClaim;
  const remaining = 24*60*60*1000 - diff;

  if(remaining <= 0){
    activateReward();
    setProgress(100);
  }else{
    deactivateReward();

    const percent = ((24*60*60*1000 - remaining) / (24*60*60*1000)) * 100;
    setProgress(percent);

    startCountdown(remaining);
  }
}

function activateReward(){
  dailyBtn.classList.add("daily-ready");
  dailyBtn.classList.remove("daily-claimed");
  stopCountdown();
}

function deactivateReward(){
  dailyBtn.classList.remove("daily-ready");
  dailyBtn.classList.add("daily-claimed");
  setProgress(0); // 🔥 إعادة الدائرة للصفر
}

function startCountdown(ms){

  stopCountdown();

  const total = 24*60*60*1000; // 24 ساعة كاملة

  countdownInterval = setInterval(()=>{

    ms -= 1000;

    if(ms <= 0){
      clearInterval(countdownInterval);
      activateReward();
      setProgress(100); // اكتمال الدائرة
      
      return;
    }

    const hours = Math.floor(ms / (1000*60*60));
    const minutes = Math.floor((ms % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((ms % (1000*60)) / 1000);



    // 🔥 حساب نسبة التقدم
    const percent = ((total - ms) / total) * 100;
    setProgress(percent);

  },1000);
}

function stopCountdown(){
  if(countdownInterval){
    clearInterval(countdownInterval);
  }
}

    alert("اكتب اسم جديد");
    return;
  }

  try {

    let photoURL = currentUser.photoURL || "";

    // ===== رفع الصورة إلى Cloudinary =====
    if (file) {

      const cloudName = "dxgk9f23z";
      const uploadPreset = "ysokgsdi";
      
      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", uploadPreset);

      const response = await fetch(
        `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
        {
          method: "POST",
          body: formData
        }
      );

      const data = await response.json();
      console.log("Cloudinary response:", data);

      if (!response.ok) {
        throw new Error(data.error?.message || "Upload failed");
      }

      if (!data.secure_url) {
        throw new Error("No secure_url returned");
      }

      photoURL = data.secure_url;
    }

    // ===== تحديث Firebase Authentication =====
    await updateProfile(currentUser, {
      displayName: newName,
      photoURL: photoURL
    });

    // ===== تحديث Firestore =====

      photo: photoURL
    });

    // ===== تحديث الواجهة =====

    document.getElementById("userPhoto").src = photoURL;

    document.getElementById("editModal").style.display = "none";

function renderPrizes(snapshot){

  const container = document.getElementById("prizesContainer");

  let html = "";
  let totalPrizes = snapshot.size;
  let totalWinners = 0;
  let totalPoints = 0;

  snapshot.forEach(docSnap=>{

    const p = docSnap.data();

    if(!p.active) totalWinners++;
    totalPoints += p.currentPoints || 0;

    const percent = Math.min(
      ((p.currentPoints || 0) / (p.targetPoints || 1)) * 100,
      100
    );

    html += `
      <div class="prize-card ${!p.active ? 'winner' : ''}">
        <img src="${p.image}" loading="lazy">
        <div class="progress">
          <div class="progress-bar" style="width:${percent}%"></div>
        </div>
        <p>${p.currentPoints || 0} / ${p.targetPoints || 0} نقطة</p>
        ${
          p.active
          ? `<button class="join-btn"
               onclick="joinPrize('${docSnap.id}', this)">
               🔥 اشترك بـ 10 نقاط
             </button>`
          : `<div style="background:#00c853;padding:12px;border-radius:15px;">
              🏆 الفائز: ${p.winner || ""}
            </div>`
        }
      </div>
    `;

    // حركة الفوز مرة واحدة فقط
    if(!p.active && p.winner && !shownWinners.has(docSnap.id)){
      shownWinners.add(docSnap.id);
      setTimeout(()=>{
        showWinAnimation(p.image);
        launchConfetti();
      },600);
    }

  });

  // 🔥 هنا يتم بناء DOM مرة واحدة فقط
  container.innerHTML = html;

  document.getElementById("totalPrizes").innerText = totalPrizes;
  document.getElementById("totalWinners").innerText = totalWinners;
  document.getElementById("totalPoints").innerText = totalPoints;
}
window.joinPrize = async function(prizeId, btn){

  if(!currentUser){
    alert("انتظر قليلاً...");
    return;
  }

  const cost = 10;

  btn.disabled = true;
  btn.innerText = "جاري الاشتراك...";
  btn.style.opacity = "0.7";

  try{

    const userRef = doc(db,"users",currentUser.uid);
    const prizeRef = doc(db,"prizes",prizeId);

    const userSnap = await getDoc(userRef);
    const prizeSnap = await getDoc(prizeRef);

    if(!userSnap.exists() || !prizeSnap.exists()){
      throw new Error("بيانات غير موجودة");
    }

    const userData = userSnap.data();
    const prizeData = prizeSnap.data();

    if(!prizeData.active){
      showPopup("الجائزة مغلقة","تم إغلاق هذه الجائزة","error");
      return;
    }

    if((userData.walletBalance || 0) < cost){
      showPopup("رصيد غير كاف","لا يوجد نقاط كافية","error");
      return;
    }

    const newBalance = userData.walletBalance - cost;
    const newPoints = (prizeData.currentPoints || 0) + cost;

    // 🔥 تحديث المستخدم
    await updateDoc(userRef,{
      walletBalance: newBalance,
      totalParticipations: (userData.totalParticipations || 0) + 1
    });

    // 🔥 تحديث نقاط الجائزة
    await updateDoc(prizeRef,{
      currentPoints: newPoints
    });

    // 🔥 تسجيل المشاركة
    await addDoc(collection(db,"prizeParticipants"),{
      prizeId: prizeId,
      userId: currentUser.uid,
      name: currentUser.displayName || "مستخدم",
      photo: currentUser.photoURL || "",
      points: cost,
      createdAt: serverTimestamp()
    });

    // 🔥 تحديث الشريط العلوي (بدون merge)
    await setDoc(doc(db,"liveActivity","current"),{
      type:"join",
      userId: currentUser.uid,
      name: currentUser.displayName || "مستخدم",
      photo: currentUser.photoURL || "",
      message:"اشترك في الجائزة 🔥",
      prizeId: prizeId,
      createdAt: serverTimestamp()
    });

  }catch(error){
    console.error("Join Error:", error);
    showPopup("حدث خطأ", error.message, "error");
  }
  finally{
    btn.disabled = false;
    btn.innerText = "🔥 اشترك بـ 10 نقاط";
    btn.style.opacity = "1";
  }
};
function launchConfetti(){  
  
  const duration = 2000;  
  const end = Date.now() + duration;  
  
  (function frame() {  
    confetti({  
      particleCount: 5,  
      angle: 60,  
      spread: 55,  
      origin: { x: 0 }  
    });  
    confetti({  
      particleCount: 5,  
      angle: 120,  
      spread: 55,  
      origin: { x: 1 }  
    });  
  
    if (Date.now() < end) {  
      requestAnimationFrame(frame);  
    }  
  })();  
}
