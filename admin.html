<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MASOUDI Admin</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial;
}

body{
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.sidebar h2{
color:#f7b500;
margin-bottom:20px;
}

.sidebar button{
background:#1e293b;
border:none;
padding:12px;
border-radius:8px;
color:white;
cursor:pointer;
text-align:right;
}

.sidebar button:hover{
background:#334155;
}

/* MAIN */

.main{
flex:1;
padding:20px;
overflow:auto;
}

.section{
display:none;
}

.section.active{
display:block;
}

/* CARDS */

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:10px;
}

button.action{
margin-top:6px;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.green{background:#16a34a}
.red{background:#dc2626}
.blue{background:#2563eb}
.orange{background:#ea580c}

input{
padding:6px;
border-radius:6px;
border:none;
margin-top:5px;
width:100%;
}

img{
border-radius:8px;
}

.stat{
background:#1e293b;
padding:15px;
border-radius:10px;
text-align:center;
}

</style>

</head>
<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>MASOUDI</h2>

<button onclick="showSection('dashboard')">📊 Dashboard</button>
<button onclick="showSection('usersSection')">👥 Users</button>
<button onclick="showSection('prizesSection')">🎁 Prizes</button>
<button onclick="showSection('redeemsSection')">💎 Redeems</button>

</div>

<!-- MAIN -->

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<h2>📊 Dashboard</h2>

<div class="grid">

<div class="stat">
<h3 id="statUsers">0</h3>
<p>Users</p>
</div>

<div class="stat">
<h3 id="statPrizes">0</h3>
<p>Prizes</p>
</div>

<div class="stat">
<h3 id="statRedeems">0</h3>
<p>Redeems</p>
</div>

</div>

</div>

<!-- USERS -->

<div id="usersSection" class="section">

<h2>👥 Users</h2>

<input id="searchUser" placeholder="بحث عن مستخدم">

<div id="users" class="grid"></div>

</div>

<!-- PRIZES -->

<div id="prizesSection" class="section">

<h2>🎁 Prizes</h2>

<div class="card">

<h3>إضافة جائزة</h3>

<input id="newImage" placeholder="رابط الصورة">
<input id="targetPoints" placeholder="النقاط المطلوبة">

<button class="action green" onclick="createPrize()">إنشاء</button>

</div>

<div id="prizes" class="grid"></div>

</div>

<!-- REDEEMS -->

<div id="redeemsSection" class="section">

<h2>💎 Redeem Requests</h2>

<div id="redeems"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc,
increment,
setDoc,
getDoc,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDhxOBatW40tfzP2nZVhSjJI55NeY4Nf_o",
authDomain: "popo-da43c.firebaseapp.com",
projectId: "popo-da43c",
storageBucket: "popo-da43c.firebasestorage.app",
messagingSenderId: "570136899084",
appId: "1:570136899084:web:2a86be16b0ff2261c98829"

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* حماية الأدمن */

onAuthStateChanged(auth, async(user)=>{

if(!user){
location.href="login.html";
return;
}

const snap = await getDoc(doc(db,"users",user.uid));

if(!snap.exists() || snap.data().isAdmin !== true){

alert("هذا الحساب ليس أدمن");

location.href="index.html";

return;

}

loadStats();
loadUsers();
loadPrizes();
loadRedeems();

});

/* تبديل الأقسام */

window.showSection = (id)=>{

document.querySelectorAll(".section").forEach(sec=>{
sec.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

/* الإحصائيات */

function loadStats(){

onSnapshot(collection(db,"users"),snap=>{
document.getElementById("statUsers").innerText=snap.size
})

onSnapshot(collection(db,"prizes"),snap=>{
document.getElementById("statPrizes").innerText=snap.size
})

onSnapshot(collection(db,"redeemRequests"),snap=>{
document.getElementById("statRedeems").innerText=snap.size
})

}

/* USERS */

function loadUsers(){

onSnapshot(collection(db,"users"),snap=>{

let html=""

snap.forEach(docSnap=>{

const d=docSnap.data()

const uid=docSnap.id

html+=`

<div class="card">

<img src="${d.photo || 'https://i.imgur.com/6VBx3io.png'}" width="50">

<h3>${d.name || "-"}</h3>

<p>💰 ${d.walletBalance || 0}</p>

<input id="points-${uid}" placeholder="عدد النقاط">

<button class="action blue" onclick="addPoints('${uid}')">
إضافة نقاط
</button>

<button class="action red" onclick="removeUser('${uid}')">
حذف
</button>

</div>

`

})

document.getElementById("users").innerHTML=html

})

}

window.addPoints = async(uid)=>{

const val=document.getElementById(`points-${uid}`).value

if(!val)return

await updateDoc(doc(db,"users",uid),{

walletBalance:increment(Number(val))

})

alert("تم إضافة النقاط")

}

window.removeUser = async(uid)=>{

if(confirm("حذف المستخدم؟")){

await deleteDoc(doc(db,"users",uid))

}

}

/* PRIZES */

function loadPrizes(){

onSnapshot(collection(db,"prizes"),snap=>{

let html=""

snap.forEach(docSnap=>{

const d=docSnap.data()

html+=`

<div class="card">

<img src="${d.image}" width="100%">

<p>${d.currentPoints}/${d.targetPoints}</p>

<p>${d.active ? "مفتوحة":"مغلقة"}</p>

<button class="action red"
onclick="deletePrize('${docSnap.id}')">

حذف

</button>

</div>

`

})

document.getElementById("prizes").innerHTML=html

})

}

window.createPrize = async ()=>{

const img=document.getElementById("newImage").value

const target=document.getElementById("targetPoints").value

await setDoc(doc(collection(db,"prizes")),{

image:img,

targetPoints:Number(target),

currentPoints:0,

active:true,

winner:""

})

alert("تم إنشاء الجائزة")

}

window.deletePrize = async(id)=>{

if(confirm("حذف الجائزة؟")){

await deleteDoc(doc(db,"prizes",id))

}

}

/* REDEEMS */

function loadRedeems(){

onSnapshot(collection(db,"redeemRequests"),snap=>{

let html=""

snap.forEach(docSnap=>{

const d=docSnap.data()

html+=`

<div class="card">

<h3>${d.userName}</h3>

<p>ID: ${d.playerId}</p>

<p>Status: ${d.status}</p>

${
d.status==="pending"
?

`<button class="action green"
onclick="approveRedeem('${docSnap.id}','${d.userId}')">

موافقة

</button>`

:""

}

</div>

`

})

document.getElementById("redeems").innerHTML=html

})

}

window.approveRedeem = async(id,uid)=>{

await updateDoc(doc(db,"redeemRequests",id),{

status:"approved"

})

await updateDoc(doc(db,"users",uid),{

totalRedeems:increment(1)

})

alert("تمت الموافقة")

}

</script>

</body>
</html>
