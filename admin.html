<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MASOUDI ADMIN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
height:100vh;
background:#0f172a;
color:white;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#f7b500;
margin-bottom:20px;
}

.menuBtn{
background:#1e293b;
border:none;
padding:12px;
border-radius:8px;
color:white;
cursor:pointer;
text-align:right;
}

.menuBtn:hover{
background:#334155;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:#020617;
padding:15px;
border-bottom:1px solid #1e293b;
}

.content{
padding:20px;
overflow:auto;
flex:1;
}

/* SECTIONS */

.section{
display:none;
}

.section.active{
display:block;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

/* SEARCH */

.search{
margin-bottom:10px;
}

.search input{
width:250px;
padding:8px;
border:none;
border-radius:6px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:center;
}

th{
background:#020617;
}

/* BUTTONS */

.btn{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.blue{background:#2563eb}
.red{background:#dc2626}
.green{background:#16a34a}
.orange{background:#ea580c}

/* SETTINGS */

#userSettings{
display:none;
position:fixed;
inset:0;
background:#000000aa;
align-items:center;
justify-content:center;
}

.settingsBox{
background:#1e293b;
padding:20px;
border-radius:10px;
width:300px;
display:flex;
flex-direction:column;
gap:10px;
}

.settingsBox input{
padding:8px;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">MASOUDI</div>

<button class="menuBtn" onclick="showSection('dashboard')">📊 Dashboard</button>

<button class="menuBtn" onclick="showSection('usersSection')">👥 المستخدمين</button>

<button class="menuBtn" onclick="showSection('prizesSection')">🎁 الجوائز</button>

<button class="menuBtn" onclick="showSection('redeemsSection')">💎 طلبات العملات</button>

</div>

<div class="main">

<div class="header">
<h2>لوحة التحكم</h2>
</div>

<div class="content">

<div id="dashboard" class="section active">

<div class="cards">

<div class="card">
<h2 id="statUsers">0</h2>
<p>المستخدمين</p>
</div>

<div class="card">
<h2 id="statPrizes">0</h2>
<p>الجوائز</p>
</div>

<div class="card">
<h2 id="statRedeems">0</h2>
<p>طلبات العملات</p>
</div>

</div>

</div>

<div id="usersSection" class="section">

<h2>المستخدمين</h2>

<div class="search">
<input id="searchUser" placeholder="بحث عن مستخدم">
</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>نسخ</th>
<th>الصورة</th>
<th>الاسم</th>
<th>النقاط</th>
<th>المشاركات</th>
<th>الفوز</th>
<th>الحالة</th>
<th>إضافة نقاط</th>
<th>الإعدادات</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

<div id="prizesSection" class="section">
<h2>الجوائز</h2>
<div id="prizesList"></div>
</div>

<div id="redeemsSection" class="section">
<h2>طلبات العملات</h2>
<div id="redeemsList"></div>
</div>

</div>
</div>

<div id="userSettings">

<div class="settingsBox">

<h3>إعدادات المستخدم</h3>

<input id="editName" placeholder="اسم المستخدم">

<input id="editPhoto" placeholder="رابط الصورة">

<input id="editPoints" placeholder="النقاط">

<button class="btn green" onclick="saveUser()">حفظ</button>

<button class="btn orange" onclick="banUser()">حظر</button>

<button class="btn blue" onclick="unbanUser()">فك الحظر</button>

<button class="btn red" onclick="closeSettings()">إغلاق</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc,
increment,
getDoc,
getDocs,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDhxOBatW40tfzP2nZVhSjJI55NeY4Nf_o",
authDomain:"popo-da43c.firebaseapp.com",
projectId:"popo-da43c",
storageBucket:"popo-da43c.appspot.com",
messagingSenderId:"570136899084",
appId:"1:570136899084:web:2a86be16b0ff2261c98829"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let selectedUser=null;

onAuthStateChanged(auth,async(user)=>{

if(!user){location.href="login.html";return;}

const snap=await getDoc(doc(db,"users",user.uid));

if(!snap.exists()||snap.data().isAdmin!==true){
alert("ليس لديك صلاحية");
location.href="index.html";
return;
}

loadStats();
loadUsers();
loadPrizes();
loadRedeems();

});

window.showSection=(id)=>{
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function loadStats(){

onSnapshot(collection(db,"users"),s=>{
document.getElementById("statUsers").innerText=s.size
})

onSnapshot(collection(db,"prizes"),s=>{
document.getElementById("statPrizes").innerText=s.size
})

onSnapshot(collection(db,"redeemRequests"),s=>{
document.getElementById("statRedeems").innerText=s.size
})

}

function loadUsers(){

onSnapshot(collection(db,"users"), async snap=>{

let html="";

for(const docSnap of snap.docs){

const d=docSnap.data()
const uid=docSnap.id

const partSnap=await getDocs(query(collection(db,"prizeParticipants"),where("userId","==",uid)))
const winSnap=await getDocs(query(collection(db,"prizes"),where("winner","==",(d.name||""))))

const status=d.banned?"🚫 محظور":"✅ نشط"

html+=`

<tr>

<td style="font-size:11px">${uid}</td>

<td>
<button class="btn blue" onclick="copyID('${uid}')">📋</button>
</td>

<td>
<img src="${d.photo||'https://i.imgur.com/6VBx3io.png'}" width="40">
</td>

<td>${d.name||"-"}</td>

<td>${d.walletBalance||0}</td>

<td>${partSnap.size}</td>

<td>${winSnap.size}</td>

<td>${status}</td>

<td>
<input id="p-${uid}" style="width:60px">
<button class="btn blue" onclick="addPoints('${uid}')">+</button>
</td>

<td>
<button class="btn green" onclick="openSettings('${uid}','${d.name}','${d.photo}',${d.walletBalance||0})">⚙</button>
</td>

<td>
<button class="btn red" onclick="removeUser('${uid}')">حذف</button>
</td>

</tr>
`

}

document.getElementById("usersTable").innerHTML=html

})

}

window.copyID=function(id){
navigator.clipboard.writeText(id)
alert("تم نسخ ID المستخدم")
}

window.addPoints=async(uid)=>{
const val=document.getElementById("p-"+uid).value
if(!val)return
await updateDoc(doc(db,"users",uid),{walletBalance:increment(Number(val))})
alert("تم إضافة النقاط")
}

window.openSettings=(uid,name,photo,points)=>{
selectedUser=uid
editName.value=name||""
editPhoto.value=photo||""
editPoints.value=points||0
userSettings.style.display="flex"
}

window.closeSettings=()=>{userSettings.style.display="none"}

window.saveUser=async()=>{
await updateDoc(doc(db,"users",selectedUser),{
name:editName.value,
photo:editPhoto.value,
walletBalance:Number(editPoints.value)
})
alert("تم التحديث")
}

window.banUser=async()=>{
await updateDoc(doc(db,"users",selectedUser),{banned:true})
alert("تم الحظر")
}

window.unbanUser=async()=>{
await updateDoc(doc(db,"users",selectedUser),{banned:false})
alert("تم فك الحظر")
}

window.removeUser=async(uid)=>{
if(confirm("حذف المستخدم؟")){
await deleteDoc(doc(db,"users",uid))
}
}

function loadPrizes(){
onSnapshot(collection(db,"prizes"),snap=>{
document.getElementById("prizesList").innerHTML="عدد الجوائز: "+snap.size
})
}

function loadRedeems(){
onSnapshot(collection(db,"redeemRequests"),snap=>{
let html=""
snap.forEach(docSnap=>{
const d=docSnap.data()
html+=`<div class="card"><b>${d.userName}</b><p>ID: ${d.playerId}</p><p>Status: ${d.status}</p></div>`
})
document.getElementById("redeemsList").innerHTML=html
})
}

searchUser.addEventListener("input",()=>{
const val=searchUser.value.toLowerCase()
document.querySelectorAll("#usersTable tr").forEach(row=>{
row.style.display=row.innerText.toLowerCase().includes(val)?"":"none"
})
})

</script>

</body>
</html>
