<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MASOUDI ADMIN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#ece7e3;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{

width:260px;
background:#f4efea;
padding:20px;

display:flex;
flex-direction:column;
justify-content:space-between;

border-radius:20px 0 0 20px;

}

.profile{

text-align:center;
margin-bottom:20px;

}

.profile img{

width:60px;
height:60px;
border-radius:50%;
margin-bottom:10px;

}

.profile h3{

font-size:15px;

}

/* MENU */

.menu{

display:flex;
flex-direction:column;
gap:10px;

}

.menu button{

border:none;
padding:12px;
border-radius:10px;
background:#e6dfd9;
cursor:pointer;
text-align:right;
font-size:14px;
transition:.3s;

}

.menu button:hover{

background:#d8d0ca;

}

/* MAIN */

.main{

flex:1;
padding:20px;
display:flex;
flex-direction:column;

}

/* HEADER */

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

.header input{

padding:10px;
border-radius:20px;
border:none;
width:250px;
background:#ddd;

}

/* GRID */

.grid{

display:grid;
grid-template-columns:2fr 1fr;
gap:20px;

}

/* CARD */

.card{

background:#f4efea;
padding:20px;
border-radius:20px;

}

/* SMALL CARDS */

.smallCards{

display:grid;
grid-template-columns:1fr;
gap:15px;

}

.small{

background:#c7b6be;
padding:20px;
border-radius:20px;
text-align:center;

}

.small h2{

margin-top:10px;

}

/* TABLE */

table{

width:100%;
margin-top:20px;
border-collapse:collapse;

}

th,td{

padding:10px;
border-bottom:1px solid #ddd;
text-align:center;

}

th{

background:#e6dfd9;

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div>

<h2>MASOUDI</h2>

<div class="profile">

<img src="https://i.imgur.com/6VBx3io.png">

<h3>Admin</h3>

</div>

<div class="menu">

<button>Dashboard</button>

<button>المستخدمين</button>

<button>الجوائز</button>

<button>طلبات العملات</button>

<button>الفائزين</button>

<button>إدارة الحظر</button>

<button>إرسال نقاط</button>

<button>تعديل الحساب</button>

<button>سجل النقاط</button>

</div>

</div>

<button>Logout</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<h2>Hello Admin 👋</h2>

<input placeholder="بحث">

</div>

<div class="grid">

<!-- LEFT -->

<div>

<div class="card">

<h3>إحصائيات الموقع</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>المستخدمين</h3>

<table>

<thead>

<tr>

<th>ID</th>
<th>الصورة</th>
<th>الاسم</th>
<th>النقاط</th>
<th>الحالة</th>

</tr>

</thead>

<tbody>

<tr>

<td>123456</td>

<td>
<img src="https://i.imgur.com/6VBx3io.png" width="40">
</td>

<td>Ahmed</td>

<td>1500</td>

<td>نشط</td>

</tr>

<tr>

<td>984223</td>

<td>
<img src="https://i.imgur.com/6VBx3io.png" width="40">
</td>

<td>Sami</td>

<td>800</td>

<td>محظور</td>

</tr>

</tbody>

</table>

</div>

</div>

<!-- RIGHT -->

<div class="smallCards">

<div class="small">

<h3>المستخدمين</h3>

<h2>250</h2>

</div>

<div class="small">

<h3>الجوائز</h3>

<h2>18</h2>

</div>

<div class="small">

<h3>الطلبات</h3>

<h2>32</h2>

</div>

</div>

</div>

</div>

<script>

const ctx=document.getElementById('chart')

new Chart(ctx,{

type:'doughnut',

data:{

labels:['Users','Prizes','Requests'],

datasets:[{

data:[250,18,32],

backgroundColor:[

'#ff6384',
'#36a2eb',
'#ffcd56'

]

}]

}

})

</script>

</body>

</html>
