<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MASOUDI Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
height:100vh;
background:#0f172a;
color:white;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#f7b500;
margin-bottom:20px;
}

.menuBtn{
background:#1e293b;
border:none;
padding:12px;
border-radius:8px;
color:white;
cursor:pointer;
text-align:right;
}

.menuBtn:hover{
background:#334155;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:#020617;
padding:15px;
border-bottom:1px solid #1e293b;
}

.content{
padding:20px;
overflow:auto;
flex:1;
}

.section{
display:none;
}

.section.active{
display:block;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:center;
}

th{
background:#020617;
}

/* BUTTON */

.btn{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.blue{background:#2563eb}
.red{background:#dc2626}
.green{background:#16a34a}

input{
padding:5px;
border-radius:5px;
border:none;
}

img{
border-radius:6px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">MASOUDI</div>

<button class="menuBtn" onclick="showSection('dashboard')">📊 Dashboard</button>

<button class="menuBtn" onclick="showSection('usersSection')">👥 المستخدمين</button>

<button class="menuBtn" onclick="showSection('prizesSection')">🎁 الجوائز</button>

<button class="menuBtn" onclick="showSection('redeemsSection')">💎 طلبات العملات</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">
<h2>لوحة التحكم</h2>
</div>

<div class="content">

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<div class="cards">

<div class="card">
<h2 id="statUsers">0</h2>
<p>المستخدمين</p>
</div>

<div class="card">
<h2 id="statPrizes">0</h2>
<p>الجوائز</p>
</div>

<div class="card">
<h2 id="statRedeems">0</h2>
<p>طلبات العملات</p>
</div>

</div>

</div>

<!-- USERS -->

<div id="usersSection" class="section">

<h2>المستخدمين</h2>

<table>

<thead>
<tr>
<th>الصورة</th>
<th>الاسم</th>
<th>النقاط</th>
<th>إضافة نقاط</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

<!-- PRIZES -->

<div id="prizesSection" class="section">

<h2>الجوائز</h2>

<div id="prizesList"></div>

</div>

<!-- REDEEMS -->

<div id="redeemsSection" class="section">

<h2>طلبات شراء العملات</h2>

<div id="redeemsList"></div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc,
increment,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey:"AIzaSyDhxOBatW40tfzP2nZVhSjJI55NeY4Nf_o",
authDomain:"popo-da43c.firebaseapp.com",
projectId:"popo-da43c",
storageBucket:"popo-da43c.appspot.com",
messagingSenderId:"570136899084",
appId:"1:570136899084:web:2a86be16b0ff2261c98829"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* ADMIN PROTECTION */

onAuthStateChanged(auth,async(user)=>{

if(!user){

location.href="login.html";

return;

}

const snap=await getDoc(doc(db,"users",user.uid));

if(!snap.exists() || snap.data().isAdmin!==true){

alert("هذا الحساب ليس أدمن");

location.href="index.html";

return;

}

loadStats();

loadUsers();

loadPrizes();

loadRedeems();

});

/* SWITCH SECTIONS */

window.showSection=(id)=>{

document.querySelectorAll(".section").forEach(sec=>{

sec.classList.remove("active")

})

document.getElementById(id).classList.add("active")

}

/* STATS */

function loadStats(){

onSnapshot(collection(db,"users"),snap=>{

document.getElementById("statUsers").innerText=snap.size

})

onSnapshot(collection(db,"prizes"),snap=>{

document.getElementById("statPrizes").innerText=snap.size

})

onSnapshot(collection(db,"redeemRequests"),snap=>{

document.getElementById("statRedeems").innerText=snap.size

})

}

/* USERS */

function loadUsers(){

onSnapshot(collection(db,"users"),snap=>{

let html=""

snap.forEach(docSnap=>{

const d=docSnap.data()

html+=`

<tr>

<td><img src="${d.photo || 'https://i.imgur.com/6VBx3io.png'}" width="40"></td>

<td>${d.name || "-"}</td>

<td>${d.walletBalance || 0}</td>

<td>

<input id="p-${docSnap.id}" style="width:60px">

<button class="btn blue" onclick="addPoints('${docSnap.id}')">+</button>

</td>

<td>

<button class="btn red" onclick="removeUser('${docSnap.id}')">حذف</button>

</td>

</tr>

`

})

document.getElementById("usersTable").innerHTML=html

})

}

window.addPoints=async(uid)=>{

const val=document.getElementById("p-"+uid).value

if(!val)return

await updateDoc(doc(db,"users",uid),{

walletBalance:increment(Number(val))

})

alert("تم إضافة النقاط")

}

window.removeUser=async(uid)=>{

if(confirm("حذف المستخدم؟")){

await deleteDoc(doc(db,"users",uid))

}

}

/* PRIZES */

function loadPrizes(){

onSnapshot(collection(db,"prizes"),snap=>{

document.getElementById("prizesList").innerHTML=

"عدد الجوائز: "+snap.size

})

}

/* REDEEMS */

function loadRedeems(){

onSnapshot(collection(db,"redeemRequests"),snap=>{

let html=""

snap.forEach(docSnap=>{

const d=docSnap.data()

html+=`

<div class="card">

<b>${d.userName}</b>

<p>ID: ${d.playerId}</p>

<p>Status: ${d.status}</p>

</div>

`

})

document.getElementById("redeemsList").innerHTML=html

})

}

</script>

</body>
</html>
