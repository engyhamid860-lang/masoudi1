<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MASOUDI ADMIN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
height:100vh;
background:#0f172a;
color:white;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.logo{
font-size:22px;
font-weight:bold;
color:#f7b500;
margin-bottom:20px;
}

.menuBtn{
background:#1e293b;
border:none;
padding:12px;
border-radius:8px;
color:white;
cursor:pointer;
text-align:right;
transition:.3s;
}

.menuBtn:hover{
background:#334155;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
background:#020617;
padding:15px;
border-bottom:1px solid #1e293b;
display:flex;
justify-content:space-between;
}

.content{
padding:20px;
overflow:auto;
flex:1;
}

/* SECTIONS */

.section{
display:none;
}

.section.active{
display:block;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
font-size:18px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:center;
}

th{
background:#020617;
}

/* BUTTONS */

.btn{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.blue{background:#2563eb}
.red{background:#dc2626}
.green{background:#16a34a}
.orange{background:#ea580c}

/* SEARCH */

.search{
margin-bottom:10px;
}

.search input{
padding:8px;
border:none;
border-radius:6px;
width:250px;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">MASOUDI</div>

<button class="menuBtn" onclick="showSection('dashboard')">📊 Dashboard</button>
<button class="menuBtn" onclick="showSection('usersSection')">👥 Users</button>
<button class="menuBtn" onclick="showSection('prizesSection')">🎁 Prizes</button>
<button class="menuBtn" onclick="showSection('redeemsSection')">💎 Redeems</button>
<button class="menuBtn" onclick="showSection('winnersSection')">🏆 Winners</button>

</div>

<div class="main">

<div class="header">

<h2>لوحة التحكم</h2>

</div>

<div class="content">

<!-- DASHBOARD -->

<div id="dashboard" class="section active">

<div class="cards">

<div class="card">
👥 المستخدمين
<h2 id="statUsers">0</h2>
</div>

<div class="card">
🎁 الجوائز
<h2 id="statPrizes">0</h2>
</div>

<div class="card">
💎 الطلبات
<h2 id="statRedeems">0</h2>
</div>

<div class="card">
🏆 الفائزين
<h2 id="statWinners">0</h2>
</div>

</div>

<canvas id="chart"></canvas>

</div>

<!-- USERS -->

<div id="usersSection" class="section">

<h2>المستخدمين</h2>

<div class="search">
<input id="searchUser" placeholder="بحث عن مستخدم">
</div>

<table>

<thead>

<tr>
<th>ID</th>
<th>الصورة</th>
<th>الاسم</th>
<th>النقاط</th>
<th>الحالة</th>
<th>إضافة</th>
<th>حظر</th>
<th>حذف</th>
</tr>

</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

<!-- PRIZES -->

<div id="prizesSection" class="section">
<h2>الجوائز</h2>
<div id="prizesList"></div>
</div>

<!-- REDEEMS -->

<div id="redeemsSection" class="section">
<h2>طلبات العملات</h2>
<div id="redeemsList"></div>
</div>

<!-- WINNERS -->

<div id="winnersSection" class="section">
<h2>الفائزين</h2>
<div id="winnersList"></div>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc,
increment,
getDoc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyDhxOBatW40tfzP2nZVhSjJI55NeY4Nf_o",
authDomain:"popo-da43c.firebaseapp.com",
projectId:"popo-da43c",
storageBucket:"popo-da43c.appspot.com",
messagingSenderId:"570136899084",
appId:"1:570136899084:web:2a86be16b0ff2261c98829"

};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

/* ADMIN CHECK */

onAuthStateChanged(auth,async(user)=>{

if(!user){location.href="login.html";return;}

const snap=await getDoc(doc(db,"users",user.uid));

if(!snap.exists()||snap.data().isAdmin!==true){

alert("ليس لديك صلاحية");

location.href="index.html";

return;

}

loadStats();
loadUsers();
loadRedeems();
loadPrizes();
loadWinners();

});

/* SWITCH */

window.showSection=(id)=>{

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* STATS */

function loadStats(){

onSnapshot(collection(db,"users"),s=>{
statUsers.innerText=s.size
})

onSnapshot(collection(db,"prizes"),s=>{
statPrizes.innerText=s.size
})

onSnapshot(collection(db,"redeemRequests"),s=>{
statRedeems.innerText=s.size
})

onSnapshot(collection(db,"prizes"),snap=>{

let winners=0

snap.forEach(d=>{
if(!d.data().active) winners++
})

statWinners.innerText=winners

})

}

/* USERS */

function loadUsers(){

onSnapshot(collection(db,"users"),snap=>{

let html=""

snap.forEach(docSnap=>{

const d=docSnap.data()
const uid=docSnap.id

const status=d.banned?"🚫":"✅"

html+=`

<tr>

<td>${uid}</td>

<td>
<img src="${d.photo||'https://i.imgur.com/6VBx3io.png'}" width="40">
</td>

<td>${d.name||"-"}</td>

<td>${d.walletBalance||0}</td>

<td>${status}</td>

<td>
<input id="p-${uid}" style="width:50px">
<button class="btn blue" onclick="addPoints('${uid}')">+</button>
</td>

<td>
<button class="btn orange" onclick="banUser('${uid}')">🚫</button>
</td>

<td>
<button class="btn red" onclick="removeUser('${uid}')">🗑</button>
</td>

</tr>

`

})

usersTable.innerHTML=html

})

}

/* ADD POINTS */

window.addPoints=async(uid)=>{

const val=document.getElementById("p-"+uid).value

if(!val)return

await updateDoc(doc(db,"users",uid),{
walletBalance:increment(Number(val))
})

}

/* BAN */

window.banUser=async(uid)=>{

await updateDoc(doc(db,"users",uid),{
banned:true
})

}

/* DELETE */

window.removeUser=async(uid)=>{

if(confirm("حذف المستخدم؟")){

await deleteDoc(doc(db,"users",uid))

}

}

/* REDEEMS */

function loadRedeems(){

onSnapshot(collection(db,"redeemRequests"),snap=>{

let html=""

snap.forEach(docSnap=>{

const d=docSnap.data()

html+=`
<div class="card">
<b>${d.userName}</b>
<p>ID: ${d.playerId}</p>
<p>Status: ${d.status}</p>
</div>
`

})

redeemsList.innerHTML=html

})

}

/* PRIZES */

function loadPrizes(){

onSnapshot(collection(db,"prizes"),snap=>{
prizesList.innerHTML="عدد الجوائز: "+snap.size
})

}

/* WINNERS */

function loadWinners(){

onSnapshot(collection(db,"prizes"),snap=>{

let html=""

snap.forEach(docSnap=>{

const d=docSnap.data()

if(!d.active){

html+=`
<div class="card">
🏆 ${d.winner}
</div>
`

}

})

winnersList.innerHTML=html

})

}

</script>

</body>
</html>
