<!DOCTYPE html><html lang="ar" dir="rtl">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>MASOUDI Admin Panel</title><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#020617;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
border-left:1px solid #1e293b;
}

.logo{
font-size:22px;
font-weight:bold;
color:#f7b500;
margin-bottom:20px;
}

.nav-btn{
background:none;
border:none;
color:#cbd5f5;
padding:12px;
border-radius:8px;
text-align:right;
cursor:pointer;
font-size:15px;
}

.nav-btn:hover{
background:#1e293b;
color:white;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
background:#020617;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #1e293b;
}

.header h2{
font-size:18px;
}

.search{
background:#1e293b;
border:none;
padding:8px;
border-radius:6px;
color:white;
}

/* CONTENT */

.content{
padding:20px;
overflow:auto;
flex:1;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.card h3{
font-size:26px;
margin-bottom:5px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
border-bottom:1px solid #334155;
text-align:center;
}

th{
background:#020617;
}

/* BUTTONS */

.btn{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
}

.green{background:#16a34a}
.red{background:#dc2626}
.blue{background:#2563eb}
.orange{background:#ea580c}

.section{
display:none;
}

.section.active{
display:block;
}

</style></head><body><!-- SIDEBAR --><div class="sidebar"><div class="logo">MASOUDI</div><button class="nav-btn" onclick="showSection('dashboard')">📊 Dashboard</button>
<button class="nav-btn" onclick="showSection('users')">👥 المستخدمين</button>
<button class="nav-btn" onclick="showSection('prizes')">🎁 الجوائز</button>
<button class="nav-btn" onclick="showSection('redeems')">💎 طلبات الشراء</button>

</div><!-- MAIN --><div class="main"><div class="header"><h2>لوحة التحكم</h2><input id="searchUser" class="search" placeholder="بحث مستخدم"></div><div class="content"><!-- DASHBOARD --><div id="dashboard" class="section active"><div class="cards"><div class="card">
<h3 id="statUsers">0</h3>
<p>المستخدمين</p>
</div><div class="card">
<h3 id="statPrizes">0</h3>
<p>الجوائز</p>
</div><div class="card">
<h3 id="statRedeems">0</h3>
<p>طلبات الشراء</p>
</div></div></div><!-- USERS --><div id="users" class="section"><h2 style="margin-bottom:10px">المستخدمين</h2><table><thead>
<tr>
<th>الصورة</th>
<th>الاسم</th>
<th>النقاط</th>
<th>إضافة نقاط</th>
<th>إجراء</th>
</tr>
</thead><tbody id="usersTable"></tbody></table></div><!-- PRIZES --><div id="prizes" class="section"><h2 style="margin-bottom:10px">الجوائز</h2><div id="prizesList"></div></div><!-- REDEEMS --><div id="redeems" class="section"><h2 style="margin-bottom:10px">طلبات شراء العملات</h2><div id="redeemList"></div></div></div></div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc,
increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyDhxOBatW40tfzP2nZVhSjJI55NeY4Nf_o",
authDomain:"popo-da43c.firebaseapp.com",
projectId:"popo-da43c"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* تغيير الأقسام */

window.showSection=(id)=>{

document.querySelectorAll(".section").forEach(s=>{

s.classList.remove("active")

})

document.getElementById(id).classList.add("active")

}

/* USERS */

onSnapshot(collection(db,"users"),snap=>{

document.getElementById("statUsers").innerText=snap.size

let html=""

snap.forEach(docSnap=>{

const d=docSnap.data()

html+=`

<tr>

<td><img src="${d.photo||''}" width="40"></td>

<td>${d.name||''}</td>

<td>${d.walletBalance||0}</td>

<td>

<input id="p-${docSnap.id}" style="width:60px">

<button class="btn blue" onclick="addPoints('${docSnap.id}')">إضافة</button>

</td>

<td>

<button class="btn red" onclick="removeUser('${docSnap.id}')">حذف</button>

</td>

</tr>

`

})

document.getElementById("usersTable").innerHTML=html

})

window.addPoints=async(uid)=>{

const val=document.getElementById("p-"+uid).value

if(!val)return

await updateDoc(doc(db,"users",uid),{

walletBalance:increment(Number(val))

})

alert("تمت إضافة النقاط")

}

window.removeUser=async(uid)=>{

if(confirm("حذف المستخدم؟")){

await deleteDoc(doc(db,"users",uid))

}

}

/* REDEEMS */

onSnapshot(collection(db,"redeemRequests"),snap=>{

document.getElementById("statRedeems").innerText=snap.size

let html=""

snap.forEach(docSnap=>{

const d=docSnap.data()

html+=`

<div style="background:#1e293b;padding:10px;border-radius:8px;margin-bottom:8px">

<b>${d.userName}</b>

<p>ID: ${d.playerId}</p>

<p>Status: ${d.status}</p>

</div>

`

})

document.getElementById("redeemList").innerHTML=html

})

</script></body>
</html>
