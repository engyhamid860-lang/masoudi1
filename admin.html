<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MASOUDI ADMIN</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI;
}

body{
background:#f3eaf1;
display:flex;
height:100vh;
}

/* SIDEBAR */

.sidebar{

width:260px;
background:white;
padding:20px;
border-radius:20px;
margin:20px;

box-shadow:0 10px 40px rgba(0,0,0,.1);

display:flex;
flex-direction:column;
gap:15px;

}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
}

.menu{
display:flex;
flex-direction:column;
gap:10px;
}

.menu button{

background:none;
border:none;
padding:12px;
border-radius:10px;

cursor:pointer;

text-align:right;

font-size:15px;

transition:.3s;

}

.menu button:hover{

background:#f1f1f1;
transform:translateX(-5px);

}

/* MAIN */

.main{

flex:1;
padding:30px;

display:flex;
flex-direction:column;
gap:20px;

}

.topbar{

display:flex;
justify-content:space-between;
align-items:center;

}

.search{

padding:10px;
border-radius:10px;
border:none;
background:white;

width:300px;

box-shadow:0 5px 20px rgba(0,0,0,.1);

}

/* CARDS */

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;

}

.card{

background:white;
padding:20px;
border-radius:15px;

box-shadow:0 10px 30px rgba(0,0,0,.1);

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

/* STATS */

.stat{

font-size:28px;
font-weight:bold;

}

/* CONTENT GRID */

.grid{

display:grid;
grid-template-columns:2fr 1fr;
gap:20px;

}

/* LIST */

.list{

background:white;
padding:20px;
border-radius:15px;

box-shadow:0 10px 30px rgba(0,0,0,.1);

}

/* USERS TABLE */

table{

width:100%;
border-collapse:collapse;

}

th,td{

padding:10px;
text-align:center;

}

tr{

border-bottom:1px solid #eee;

}

/* BUTTONS */

.btn{

border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;

}

.green{background:#00c853;color:white}
.red{background:#ff5252;color:white}
.blue{background:#2979ff;color:white}
.orange{background:#ff9100;color:white}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">MASOUDI</div>

<div class="menu">

<button onclick="show('dashboard')">📊 Dashboard</button>
<button onclick="show('users')">👥 المستخدمين</button>
<button onclick="show('coins')">💰 العملات</button>
<button onclick="show('redeems')">💎 الطلبات</button>
<button onclick="show('games')">🎮 الألعاب</button>
<button onclick="show('logs')">🪙 السجل</button>
<button onclick="logout()">🚪 خروج</button>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h2>Hello Admin</h2>

<input class="search" placeholder="بحث...">

</div>

<!-- DASHBOARD -->

<div id="dashboard">

<div class="cards">

<div class="card">
Users
<div class="stat" id="usersCount">0</div>
</div>

<div class="card">
Coins
<div class="stat" id="coinsCount">0</div>
</div>

<div class="card">
Redeems
<div class="stat" id="redeemsCount">0</div>
</div>

<div class="card">
Winners
<div class="stat" id="winnersCount">0</div>
</div>

</div>

<div class="grid">

<div class="list">

<h3>Analytics</h3>

<canvas id="chart"></canvas>

</div>

<div class="list">

<h3>Notifications</h3>

<div id="notifications"></div>

</div>

</div>

</div>

<!-- USERS -->

<div id="users" style="display:none">

<h2>المستخدمين</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>الاسم</th>
<th>النقاط</th>
<th>حظر</th>
<th>حذف</th>

</tr>

</thead>

<tbody id="usersTable"></tbody>

</table>

</div>

</div>

<script>

function show(id){

document.querySelectorAll(".main > div")
.forEach(el=>el.style.display="none")

document.getElementById(id).style.display="block"

}

</script>

</body>

</html>
